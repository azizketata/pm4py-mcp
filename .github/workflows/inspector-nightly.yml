name: Inspector (nightly)

on:
  schedule:
    - cron: "0 6 * * *"  # 06:00 UTC daily
  workflow_dispatch: {}

jobs:
  inspector:
    name: MCP Inspector CLI smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install package
        run: uv sync --extra dev

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Inspector - list tools
        run: >
          npx --yes @modelcontextprotocol/inspector
          --cli
          uv run pm4py-mcp
          --method tools/list

      - name: Inspector - call ping
        run: >
          npx --yes @modelcontextprotocol/inspector
          --cli
          uv run pm4py-mcp
          --method tools/call
          --tool-name ping

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Inspector nightly failed on ${new Date().toISOString().slice(0, 10)}`;
            const body = `The nightly MCP Inspector CLI smoke test failed.\n\nRun: ${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["ci", "inspector"],
            });
