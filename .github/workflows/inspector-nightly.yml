name: Inspector (nightly)

on:
  schedule:
    - cron: "0 6 * * *"  # 06:00 UTC daily
  workflow_dispatch: {}

jobs:
  inspector:
    name: MCP Inspector CLI smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install package
        run: uv sync --extra dev

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      # Protocol-level check: tools/list must return the full Phase 1 + Phase 2 + Phase 3 surface.
      # Inspector CLI invocations are stateless — server spawns fresh each call —
      # so we can't chain log_id/ocel_id through multiple tools. These calls
      # exercise everything that doesn't need a prior handle.
      - name: Inspector - list tools (expect 49)
        run: |
          output=$(npx --yes @modelcontextprotocol/inspector --cli uv run pm4py-mcp --method tools/list)
          echo "$output"
          count=$(echo "$output" | python -c "import json, sys; d=json.load(sys.stdin); print(len(d.get('tools', [])))")
          echo "tool count: $count"
          if [ "$count" -ne 49 ]; then
            echo "Expected 49 tools, got $count"
            exit 1
          fi

      - name: Inspector - list prompts (expect 6)
        run: |
          output=$(npx --yes @modelcontextprotocol/inspector --cli uv run pm4py-mcp --method prompts/list)
          echo "$output"
          count=$(echo "$output" | python -c "import json, sys; d=json.load(sys.stdin); print(len(d.get('prompts', [])))")
          echo "prompt count: $count"
          if [ "$count" -ne 6 ]; then
            echo "Expected 6 prompts, got $count"
            exit 1
          fi

      - name: Inspector - get the new_log_onboarding prompt
        run: >
          npx --yes @modelcontextprotocol/inspector
          --cli
          uv run pm4py-mcp
          --method prompts/get
          --prompt-name new_log_onboarding
          --prompt-args log_path=examples/running-example.xes

      - name: Inspector - call ping
        run: >
          npx --yes @modelcontextprotocol/inspector
          --cli
          uv run pm4py-mcp
          --method tools/call
          --tool-name ping

      - name: Inspector - load traditional example log (XES)
        run: >
          npx --yes @modelcontextprotocol/inspector
          --cli
          uv run pm4py-mcp
          --method tools/call
          --tool-name load_event_log
          --tool-arg path=examples/running-example.xes

      - name: Inspector - load OCEL example (JSON-OCEL)
        run: >
          npx --yes @modelcontextprotocol/inspector
          --cli
          uv run pm4py-mcp
          --method tools/call
          --tool-name load_ocel
          --tool-arg path=examples/order-management.jsonocel

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Inspector nightly failed on ${new Date().toISOString().slice(0, 10)}`;
            const body = `The nightly MCP Inspector CLI smoke test failed.\n\nRun: ${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["ci", "inspector"],
            });
